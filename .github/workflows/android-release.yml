name: Android Release
# This workflow builds the Android release APK, creates a GitHub Release, and updates the JournalAPI version.json file with the new release information.
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.0.2
        required: true
      build:
        description: Android versionCode
        required: true
      app_name:
        description: Android app name
        required: false
        default: Journal
      release_notes:
        description: Release notes for GitHub Release
        required: false
        default: ''

jobs:
  build-android:
    runs-on: ubuntu-latest
    environment: DEPLOY_HOST

    defaults:
      run:
        working-directory: journalWeb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: bun install

      - name: Build web bundle
        run: bun run build

      - name: Patch AndroidManifest permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "REQUEST_INSTALL_PACKAGES" "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />\n</manifest>|' "$MANIFEST"
          fi

      - name: Generate app icons
        run: bunx @capacitor/assets generate --android

      - name: Prepare Android release metadata
        run: >
          node ./scripts/prepare-android-release.mjs
          --version "${{ github.event.inputs.version }}"
          --build "${{ github.event.inputs.build }}"
          --app-name "${{ github.event.inputs.app_name }}"

      - name: Setup signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/journal-release.jks
          cat >> android/app/build.gradle << 'GRADLE'

          android.signingConfigs {
              release {
                  storeFile file("journal-release.jks")
                  storePassword System.getenv("KEYSTORE_PASSWORD")
                  keyAlias System.getenv("KEY_ALIAS")
                  keyPassword System.getenv("KEY_PASSWORD")
              }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          GRADLE

      - name: Sync Capacitor Android
        run: bunx cap sync android

      - name: Build release APK
        working-directory: journalWeb/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Collect APK
        run: |
          mkdir -p release
          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" "release/Journal-v${{ github.event.inputs.version }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Journal v${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          files: journalWeb/release/Journal-v${{ github.event.inputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.event.inputs.version }}
          path: journalWeb/release/Journal-v${{ github.event.inputs.version }}.apk

      - name: Update JournalAPI version.json
        env:
          API_REPO_TOKEN: ${{ secrets.API_REPO_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
          BUILD: ${{ github.event.inputs.build }}
          CHANGELOG: ${{ github.event.inputs.release_notes }}
        run: |
          export APK_URL="https://github.com/Dikroll/JournalAPP/releases/download/v${VERSION}/Journal-v${VERSION}.apk"
          python3 -c "
          import urllib.request, json, os, sys, base64

          token = os.environ.get('API_REPO_TOKEN', '')
          if not token:
              print('❌ Error: API_REPO_TOKEN is not set in GitHub Secrets! Cannot update JournalAPI.')
              sys.exit(1)

          url = 'https://api.github.com/repos/Dikroll/JournalAPI/contents/src/version.json'
          req = urllib.request.Request(url, headers={'Authorization': f'token {token}'})
          sha = None
          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read().decode('utf-8'))
                  sha = data.get('sha')
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  print('version.json not found in JournalAPI, it will be created.')
              else:
                  print(f'❌ Error fetching version.json: {e.read().decode()}')
                  sys.exit(1)

          content_dict = {
              'version': os.environ['VERSION'],
              'build': int(os.environ['BUILD']),
              'apk_url': os.environ['APK_URL'],
              'changelog': os.environ.get('CHANGELOG', '').replace('\\\\n', '\n').strip()
          }
          content_b64 = base64.b64encode(json.dumps(content_dict, indent=2, ensure_ascii=False).encode('utf-8')).decode('utf-8')

          payload = {
              'message': f'release: update version to {os.environ.get(\"VERSION\")}',
              'content': content_b64
          }
          if sha:
              payload['sha'] = sha

          req_put = urllib.request.Request(url, data=json.dumps(payload).encode('utf-8'), headers={'Authorization': f'token {token}', 'Content-Type': 'application/json'}, method='PUT')
          try:
              with urllib.request.urlopen(req_put) as resp:
                  print('✅ JournalAPI version.json updated successfully!')
          except urllib.error.HTTPError as e:
              print(f'❌ Failed to update version.json: {e.read().decode()}')
              sys.exit(1)
          "
