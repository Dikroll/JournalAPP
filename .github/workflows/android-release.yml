name: Android Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.0.2
        required: true
      build:
        description: Android versionCode
        required: true
      app_name:
        description: Android app name
        required: false
        default: Journal
      release_notes:
        description: Release notes for GitHub Release
        required: false
        default: ''

jobs:
  build-android:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: journalWeb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare Android release metadata
        run: >
          bun run release:prepare
          --version "${{ github.event.inputs.version }}"
          --build "${{ github.event.inputs.build }}"
          --app-name "${{ github.event.inputs.app_name }}"

      - name: Build web bundle
        run: bun run build

      - name: Sync Capacitor Android
        run: bunx cap sync android

      - name: Build release APK
        working-directory: journalWeb/android
        run: ./gradlew assembleRelease

      - name: Collect APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk "release/Journal-v${{ github.event.inputs.version }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Journal v${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          files: journalWeb/release/Journal-v${{ github.event.inputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.event.inputs.version }}
          path: journalWeb/release/Journal-v${{ github.event.inputs.version }}.apk

      - name: Update JournalAPI version.json
        env:
          API_REPO_TOKEN: ${{ secrets.API_REPO_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
          BUILD: ${{ github.event.inputs.build }}
          CHANGELOG: ${{ github.event.inputs.release_notes }}
        working-directory: /tmp
        run: |
          export APK_URL="https://github.com/Dikroll/JournalAPP/releases/download/v${VERSION}/Journal-v${VERSION}.apk"

          git clone "https://x-access-token:${API_REPO_TOKEN}@github.com/Dikroll/JournalAPI.git" JournalAPI

          python3 -c "
import json, os
data = {
    'version': os.environ['VERSION'],
    'build': int(os.environ['BUILD']),
    'apk_url': os.environ['APK_URL'],
    'changelog': os.environ['CHANGELOG']
}
print(json.dumps(data, indent='\t', ensure_ascii=False))
" > JournalAPI/src/version.json

          cd JournalAPI
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/version.json
          git commit -m "release: update version to ${VERSION}"
          git push
          echo "✅ JournalAPI version.json updated"
